<!DOCTYPE html>
<html>
<body style="font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4;">
    <div style="max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; padding: 24px;">
        <h2 style="color: {{ '#28a745' if action == 'approved' else '#dc3545' }}; margin-top: 0;">
            Request {{ status_label }}
        </h2>
        <p>Hi {{ requester_name }},</p>
        <p>
            Your <strong>{{ request_type.title() }} Request #{{ request_id }}</strong> has been
            <strong style="color: {{ '#28a745' if action == 'approved' else '#dc3545' }};">
                {{ status_label }}
            </strong>
            by <strong>{{ approver_name }}</strong>.
        </p>
        {% if comments %}
        <p><strong>Comments:</strong> {{ comments }}</p>
        {% endif %}
        <p>
            <a href="{{ url_for(request_type + '.detail', request_id=request_id, _external=True) }}"
               style="display: inline-block; padding: 10px 20px; background: #007bff; color: #fff; text-decoration: none; border-radius: 4px;">
                View Request
            </a>
        </p>
        <hr style="border: none; border-top: 1px solid #eee;">
        <p style="color: #888; font-size: 12px;">Workforce Request System</p>
    </div>
</body>
</html>
